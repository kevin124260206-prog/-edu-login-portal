<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>註冊頁面</title>
</head>
<body>
    <h2>新使用者註冊</h2>
    <form action="welcome.html" method="GET">
        姓名：<input type="text" name="username" required><br><br>
        職業：<select>
            <option>老師</option>
            <option>學生/家長</option>
            <option>業者</option>
        </select><br><br>
        區域：<input type="text" placeholder="例如：左營區"><br><br>
        <button type="submit">確認註冊並登入</button>
    </form>
</body>
</html>
